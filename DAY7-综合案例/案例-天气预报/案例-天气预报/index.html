        //-----------------------------需求：查询城市----------------------------------
        /* 需求说明 : 调用服务端接口获取天气数据 , 完成天气预报页面的数据展示
        1.给输入框绑定事件
        2.在事件函数中获取输入框中的城市名称
        3.使用axios发送请求，将城市名称发送给服务器
        接口信息：
        GET：https://hmajax.itheima.net/api/weather/city
        参数：
        city：城市名称
        返回响应：
        {
    "code": 10000,
    "message": "查询成功",
    "data": [
        {
            "code": "110100",
            "name": "北京市 - 北京"
        },
        {
            "code": "120105",
            "name": "河北区 - 天津"
        },
        {
            "code": "120113",
            "name": "北辰区 - 天津"
        },
        {
            "code": "130203",
            "name": "路北区 - 河北省"
        },
        4.将返回的城市名遍历，每遍历一个城市就将其拼接在下拉列表中
        5.展示列表
        */
        // 1. 给输入框绑定事件
        const searchInput = document.querySelector('#search-city')
        const searchList = document.querySelector('.search-list')
        
        // 封装获取城市列表的函数
        function fetchCityList(cityName = '') {
            // 3. 使用axios发送请求，将城市名称发送给服务器
            axios({
                url: 'https://hmajax.itheima.net/api/weather/city',
                method: 'GET',
                params: {
                    city: cityName
                }
            }).then(result => {
                // 4. 将返回的城市名遍历，每遍历一个城市就将其拼接在下拉列表中
                const cityData = result.data.data
                let htmlStr = ''
                cityData.forEach(item => {
                    htmlStr += `<li class="list-group-item list-group-item-action" data-code="${item.code}">${item.name}</li>`
                })
                searchList.innerHTML = htmlStr
                
                // 5. 展示列表
                searchList.classList.remove('invisible')
            })
        }
        
        // 点击输入框时，显示所有城市信息
        searchInput.addEventListener('focus', function() {
            fetchCityList()
        })
        
        searchInput.addEventListener('input', function() {
            // 2. 在事件函数中获取输入框中的城市名称
            const cityName = this.value.trim()
            
            // 如果输入为空，显示所有城市
            if (!cityName) {
                fetchCityList()
                return
            }
            
            fetchCityList(cityName)
        })
        
        // 点击列表项时，隐藏列表并填充输入框
        searchList.addEventListener('click', function(e) {
            if (e.target.tagName === 'LI') {
                searchInput.value = e.target.innerText
                searchList.classList.add('invisible')
            }
        })
        
        // 点击页面其他地方时隐藏列表
        document.addEventListener('click', function(e) {
            if (!searchInput.contains(e.target) && !searchList.contains(e.target)) {
                searchList.classList.add('invisible')
            }
        })

}
        5.将获取的头部日期，当天天气和空气数据展示在页面上

        // 封装渲染天气数据的函数
        function renderWeatherData(weatherData) {
            // 更新日历
            document.querySelector('#calander').innerHTML = `${weatherData.dateShort} 农历 ${weatherData.dateLunar}`
            
            // 更新定位城市
            document.querySelector('#area').innerText = weatherData.area
            
            // 更新温度
            document.querySelector('.temperature').innerText = `${weatherData.temperature}℃`
            
            // 更新空气质量
            document.querySelector('.air').innerText = `${weatherData.psPm25} ${weatherData.psPm25Level}`
            
            // 更新天气图标和风向
            document.querySelector('#weather-img').src = weatherData.weatherImg
            document.querySelector('#weather-wind').innerText = `${weatherData.weather} ${weatherData.windDirection} ${weatherData.windPower}`
            
            // 更新当天天气详情
            const todayWeather = weatherData.todayWeather
            document.querySelector('#today-weather').innerHTML = `
                <div class="col-3">今天：${todayWeather.weather} ${todayWeather.temNight}-${todayWeather.temDay}℃</div>
                <div class="col-2">紫外线：${todayWeather.ultraviolet}</div>
                <div class="col-2">湿度：${todayWeather.humidity}%</div>
                <div class="col-2">日出：${todayWeather.sunriseTime}</div>
                <div class="col-3">日落：${todayWeather.sunsetTime}</div>
            `
            
            // 更新7日天气预报
            const dayForecast = weatherData.dayForecast
            let forecastHtml = ''
            dayForecast.forEach(item => {
                forecastHtml += `
                    <div>
                        <p>${item.dateFormat}</p>
                        <p class="text-muted">${item.date}</p>
                        <div><img src="${item.weatherImg}" alt=""></div>
                        <p>${item.weather}</p>
                        <p>${item.temDay}-${item.temNight}℃</p>
                        <p class="text-muted">${item.windDirection}${item.windPower}</p>
                    </div>
                `
            })
            document.querySelector('#dayForecast').innerHTML = forecastHtml
        }
        
        // 页面加载时默认显示武汉天气
        window.addEventListener('load', function() {
            fetchWeatherData('武汉')
        })
        
        // 给输入框列表绑定点击事件，获取天气数据
        searchList.addEventListener('click', function(e) {
            if (e.target.tagName === 'LI') {
                const cityName = e.target.innerText
                searchInput.value = cityName
                searchList.classList.add('invisible')
                
                // 获取城市天气数据
                fetchWeatherData(cityName)
            }
        })
        
        // 封装获取天气数据的函数
        function fetchWeatherData(cityName) {
            axios({
                url: 'https://hmajax.itheima.net/api/weather',
                method: 'GET',
                params: {
                    city: cityName
                }
            }).then(result => {
                const weatherData = result.data.data
                renderWeatherData(weatherData)
            })
        }
