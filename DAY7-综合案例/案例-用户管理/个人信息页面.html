<!doctype html>
<html lang="en">

<head>
  <!-- Required meta tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>个人信息页面</title>

  <!-- Bootstrap CSS -->
  <link href="lib/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f0f2f5;
    }

    .container {
      background-color: white;
      width: 70%;
      height: 600px;
    }

    .container>row {
      border: 1px solid #e8e8e9;
      height: 600px;
    }

    .left {
      /* border: 1px solid #e8e8e9; */
      height: 580px;
    }

    .nav .active {
      background-color: #e8f7fd;
    }

    /* div{
            border: 1px solid red;
        } */
  </style>

</head>

<body>
  <div class="container">
    <div class="toast align-items-center" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="toast-body">
        Hello, world! This is a toast message.
      </div>
    </div>
    <div class="row">
      <div class="col-md-2 left mt-3 p-0 border-end">
        <nav class="nav flex-column ms-4">
          <a class="nav-link active border-end border-3 border-primary" aria-current="page" href="#">基本设置</a>
          <a class="nav-link text-dark" href="#">安全设置</a>
          <a class="nav-link text-dark" href="#">账号绑定</a>
          <a class="nav-link text-dark" href="#">新消息通知</a>
        </nav>
      </div>
      <div class="col-md-5">
        <div class="row">
          <div class="col-md-12 mt-4 ms-3 fs-4 fw-bold">
            基本设置
          </div>
        </div>
        <div class="row">
          <div class="col-md-12 mt-3 ms-3">
            <form>
              <div class="mb-3">
                <label for="exampleInputEmail1" class="form-label">邮箱</label>
                <input type="email" class="form-control email" id="exampleInputEmail1" placeholder="请输入邮箱">
              </div>
              <div class="mb-3">
                <label for="nickname" class="form-label">昵称</label>
                <input type="text" class="form-control nickname" id="nickname" placeholder="请输入昵称">
              </div>
              <div class="mb-3">
                <div><label class="form-label">性别</label></div>
                <div class="form-check form-check-inline">
                  <input class="form-check-input gender" type="radio" name="gender" id="inlineRadio1" value="0">
                  <label class="form-check-label" for="inlineRadio1">男</label>
                </div>
                <div class="form-check form-check-inline">
                  <input class="form-check-input gender" type="radio" name="gender" id="inlineRadio2" value="1">
                  <label class="form-check-label" for="inlineRadio2">女</label>
                </div>
                <div class="mb-3">
                  <label for="exampleFormControlTextarea1" class="form-label">个人简介</label>
                  <textarea class="form-control desc" id="exampleFormControlTextarea1" rows="5"></textarea>
                </div>
              </div>
              <button type="button" class="btn btn-primary submit">提交</button>
            </form>
          </div>
        </div>
      </div>
      <div class="col-md-5">
        <div class="row">
          <div class="col-md-4 offset-md-3 mt-5">
            头像
          </div>
        </div>
        <div class="row">
          <div class="col-md-4 offset-md-3 mt-3">
            <img class="avatar" src="img/avatar.png" width="80" height="80">
          </div>
        </div>
        <div class="row">
          <div class="col-md-4 offset-md-3 mt-3">
            <button type="button" class="btn btn-light">
              <label for="uploadImg">更换头像</label>
            </button>
            <input type="file" name="icon" id="uploadImg" hidden>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="lib/js/bootstrap.bundle.min.js"></script>
  <script src="lib/js/axios.min.js"></script>

  <script>
    //--------------------需求：回显用户信息--------------------
   //需求：根据用户登录页面.html页面传递过来的用户名，查询用户信息展示在当前页面中。
//1.获取从登录页面.html页面传递过来的用户名，如果没有就跳转到href="用户登录页面.html"去
//2.使用axios发送请求，根据用户名查询用户信息
/* 请求方式：GET
          请求路径：https://hmajax.itheima.net/api/settings
          请求参数：示例如下：
              creator=黑马no1hello
          响应结果：
          {
              "message": "获取个人设置成功",
              "data": {
                  "avatar": "http://hmajax.itheima.net/avatar/avatar1.png",
                  "nickname": "itheima",
                  "email": "itheima@itcast.cn",
                  "desc": "我是老李",
                  "gender": 0
              }
          } */
//3.获取服务器返回的用户信息，展示邮箱和昵称
//4.获取性别单选框，设置性别选中。0表示男，1表示女
//5.获取并展示个人简介和头像
//需求：根据用户登录页面.html页面传递过来的用户名，查询用户信息展示在当前页面中。
//1.获取从登录页面.html页面传递过来的用户名，如果没有就跳转到href="用户登陆页面.html"去
//2.使用axios发送请求，根据用户名查询用户信息
/* 请求方式：GET
          请求路径：https://hmajax.itheima.net/api/settings
          请求参数：示例如下：
              creator=黑马no1hello
          响应结果：
          {
              "message": "获取个人设置成功",
              "data": {
                  "avatar": "http://hmajax.itheima.net/avatar/avatar1.png",
                  "nickname": "itheima",
                  "email": "itheima@itcast.cn",
                  "desc": "我是老李",
                  "gender": 0
              }
          } */
//3.获取服务器返回的用户信息，展示邮箱和昵称
//4.获取性别单选框，设置性别选中。0表示男，1表示女
//5.获取并展示个人简介和头像
    // 1. 获取从登录页面传递过来的用户名
    const creator = new URLSearchParams(location.search).get('creator')
    if (!creator) {
      location.href = '用户登录页面.html'
    }

    // 2. 使用axios发送请求，根据用户名查询用户信息
    axios({
      url: 'https://hmajax.itheima.net/api/settings',
      params: {
        creator
      }
    }).then(result => {
      const userObj = result.data.data
      // 3. 获取服务器返回的用户信息，展示邮箱和昵称
      document.querySelector('.email').value = userObj.email
      document.querySelector('.nickname').value = userObj.nickname
      // 4. 获取性别单选框，设置性别选中。0表示男，1表示女
      const genders = document.querySelectorAll('.gender')
      const gender = userObj.gender
      genders[gender].checked = true
      // 5. 获取并展示个人简介和头像
      document.querySelector('.desc').value = userObj.desc
      document.querySelector('.avatar').src = userObj.avatar
    })
    //--------------------需求：上传头像--------------------
/* 1.给上传头像按钮绑定事件，点击后用户可以上传一张图片
2.获取图片信息
3.使用axios别名方式将上传的图片提交给服务器，接口信息：https://s.apifox.cn/apidoc/docs-site/1937884/api-58280578.md
4.将服务器返回的数据展示在页面中
 */
    document.querySelector('#uploadImg').addEventListener('change', function () {
      let file = this.files[0]
      let formData = new FormData()
      formData.append('avatar', file)
      formData.append('creator', creator)
      axios.put('https://hmajax.itheima.net/api/avatar', formData).then(result => {
        document.querySelector('.avatar').src = result.data.data.avatar
      }).catch(err => {
        console.log(err.response.data.message);
      });
    })

    //--------------------需求：提交用户信息--------------------
   /* 
   1.为提交按钮绑定事件
   2.点击后获取用户信息并使用axios别名方式发送请求提交到服务器，接口信息：https://s.apifox.cn/apidoc/docs-site/1937884/api-49760207.md
   3.提交前校验用户信息是否完整，如果为空就展示错误信息
   4.提交成功后，展示成功信息并刷新页面
   
   
   */
    document.querySelector('.submit').addEventListener('click', function () {
      // 获取用户信息
      const email = document.querySelector('.email').value
      const nickname = document.querySelector('.nickname').value
      const desc = document.querySelector('.desc').value
      const gender = document.querySelector('.gender').checked ? 0 : 1;

      // 校验用户信息是否完整
      if (!email || !nickname || !desc) {
        // 展示错误信息
        const toast = document.querySelector('.toast')
        toast.querySelector('.toast-body').textContent = '请填写完整的用户信息'
        const bsToast = new bootstrap.Toast(toast)
        bsToast.show()
        return
      }

      // 使用axios别名方式发送请求提交到服务器
      axios.put('https://hmajax.itheima.net/api/settings', {
        creator,
        email,
        nickname,
        desc,
        gender
      }).then(result => {
        // 展示成功信息
        const toast = document.querySelector('.toast')
        toast.querySelector('.toast-body').textContent = result.data.message
        const bsToast = new bootstrap.Toast(toast)
        bsToast.show()
        // 刷新页面
        setTimeout(() => {
          location.reload()
        }, 1500)
      }).catch(err => {
        // 展示错误信息
        const toast = document.querySelector('.toast')
        toast.querySelector('.toast-body').textContent = err.response.data.message
        const bsToast = new bootstrap.Toast(toast)
        bsToast.show()
      })
    })

  </script>
</body>

</html>
