<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>
    /* 
    输出语句
    1、alert(内容)：弹出警告框，显示指定的内容。  【很少用】
    2、document.write(内容)：将指定的内容写入到HTML文档中。 【少用，了解】
    3、console.log(内容)：在浏览器的控制台输出指定的内容。【常用】
      打开浏览器控制台：f12/fn+f12===>选择console/控制台查看
      输出语句快捷键：log+回车
*/
alert('hello world');
document.write('hello world','hello','world');
console.log('hello world','hello','world');
  </script>
</body>
</html>
