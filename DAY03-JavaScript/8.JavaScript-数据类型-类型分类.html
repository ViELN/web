<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>
   /* 
    数据类型的分类
    1、基本数据类型（原始数据类型、简单数据类型）：
      number：数字型（整数、小数、NaN(Not a Number）)
      string：字符串型，使用单引号、双引号、反引号(``)将数据包裹起来，推荐使用单引号或者反引号。
      boolean：布尔型。表示真或者假。true表示真，false表示假
      undefined：未定义型，当声明的变量未初始化时，该变量的默认值是undefined，变量的类型是未定义
      null：空类型。
    2、引用数据类型（复杂数据类型）：Object对象、Function函数、Array数组...
    获取数据类型：使用typeof关键字
  */
 let a = 18;
 console.log(typeof a);
 let b = 'hello';
 console.log(typeof b);
 let c = true;
 console.log(typeof c);
 let d = undefined;
 console.log(typeof d);
 let e = null;
 console.log(typeof e);
  </script>
</body>
</html>
