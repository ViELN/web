<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>
  /*
    数据类型分类
    基本数据类型（原始数据类型、简单数据类型）：
    number：数字型（整数、小数、NaN(Not aNumber)）
    string：字符串型，使用单引号、双引号、反引号（｀)将数据包裹起来，推荐使用单引号或者反引号。
    boolean：布尔型。表示真或者假。true表示真，false表示假
    undefined：未定义型，当声明的变量未初始化时，该变量的默认值是undefined，变量的类型是未定义型。
    null：空类型。

    引用数据类型（复杂数据类型）：Object对象、数组...
    获取数据类型：typeof 变量名
  */
    //number：数字型（整数、小数、NaN(Not aNumber)）
    let a1 = 10;
    let a2 = 20;
    let a3 = NaN;
    console.log(a1,typeof a1);
    console.log(a2,typeof a2);
    console.log(a3,typeof a3);

    //string：字符串型，使用单引号、双引号、反引号（｀)将数据包裹起来，推荐使用单引号或者反引号。
    let s1 = 'hello';
    let s2 = "我爱中国";
    console.log(s1,typeof s1);
    console.log(s2,typeof s2);

    //boolean：布尔型。表示真或者假。true表示真，false表示假
    let b1 = true;
    let b2 = false;
    console.log(b1,typeof b1);
    console.log(b2,typeof b2);

    //undefined：未定义型，当声明的变量未初始化时，该变量的默认值是undefined，变量的类型是未定义型。
    let u1;
    console.log(u1,typeof u1);

    //null：空类型。
    let n1 = null;
    console.log(n1,typeof n1);

  </script>
  
  
</body>
</html>
