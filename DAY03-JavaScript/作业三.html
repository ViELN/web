<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>
    let num = prompt('请输入一个数字');//4567
    console.log("个位:",num%10);
    console.log("十位:",parseInt(num/10)%10);
    console.log("百位:",parseInt(num/100)%10);
    console.log("千位:",parseInt(num/1000));
  

  </script>
</body>
</html>
