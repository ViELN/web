<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>
  /* 
     比较运算符：也叫关系运算符，用来比较数据的大小。结果是boolean类型的true或者false。
      大于：>
      小于：<
      大于等于：>=
      小于等于：<=
      等于：==：只比较值，值相同结果就是true。内部隐含了隐式类型转换
      全等于：===：比较值和数据类型，值和类型都相同结果才是true。
      不等于：!=：只比较值，值不同结果就是true
      不全等：!==：比较值和数据类型，有一个不同结果就是true
  */
     console.log(18 > 10);//true
     console.log(18 < 10);//false
     console.log(18 >= 10);//true
     console.log(18 <= 10);//false
     console.log(18 == 10);//true
     console.log(18 == '18');//true
     console.log(18 === 10);//false
     console.log(18 === '18');//false
     console.log(18 != 10);//true
     console.log(18 != '18');//false
     console.log(18 !== 10);//true
     console.log(18 !== '18');//true
    
  </script>

  
</body>
</html>
