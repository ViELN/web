<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>
    /* 
      变量：是一个存储数据的容器。
          定义语法定义：let 变量名=值;
          重新赋值：变量名 = 值;
      常量：也是一个容器，用于保存数据的。
          定义语法：const 常量名=值;
          常量和变量的区别：常量里面保存的值是不允许改变的。
          使用场景：当某个值不会程序改变且在多个地方要用时，我们可以使用常量来保存。
    */
    // 变量的定义
    let a = 10;
    console.log(a);
    // 重新赋值
    a = 20;
    console.log(a);
    // 常量的定义
    const b = 100;
    console.log(b);
    // 常量的重新赋值
   /*  b = 200;
    console.log(b); */
  </script>

  
</body>
</html>
