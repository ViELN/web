<body>
  <script>
    /* 
      赋值运算符：把等号右边的值赋值给左边的变量
      简单的赋值运算符：=
      扩展的赋值运算符：+=,-=,*=,/=,%=
      a+=b; //等价于a=a+b  将a+b的结果赋值给a，也叫累加
      a-=b; //等价于a=a-b  将a-b的结果赋值给a，也叫累减
      a*=b; //等价于a=a*b  将a*b的结果赋值给a，也叫累乘
      a/=b; //等价于a=a/b  将a/b的结果赋值给a，也叫累除
      a%=b; //等价于a=a%b  将a%b的结果赋值给a，也叫取余
    */
    let a = 10;
    let b = 5;
    a+=b;
    console.log(a);//15
    // a-=b;
    // console.log(a);//5
    // a*=b;
    // console.log(a);//50
    // a/=b;
    // console.log(a);//2
    // a%=b;
    // console.log(a);//0
 

  
  </script>
