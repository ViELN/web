<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>
    /*
      变量:可以看成是一个容器，用来保存计算机中的数定义变量:
          1、先声明，后赋值。[使用较少】
          2、声明的同时直接赋值(变量的初始化)[常用】
    */
   //1、先声明，后赋值。[使用较少】
   // let age; 先声明
   // age = 18; 后赋值
   
   //2、声明的同时直接赋值(变量的初始化)[常用】
   let age = 18;
   console.log(age);   //结果：18 ，直接将18赋值给变量age
  
   // 给age变量重新赋值
   age = 20;
   console.log(age);   //结果：20 ，将20赋值给变量age


  </script>

  
</body>
</html>
