<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>
  /* 
  模板字符串：
    1、使用反引号（``）将字符串包裹起来。
    2、应用场景：可以在字符串中引入变量，使用${变量名}的方式。做字符串拼接
  */
  let name = '张三';
  let age = 18;
  console.log('大家好，我是' + name + '，我今年' + age + '岁');
  console.log(`大家好，我是${name}，我今年${age}岁`);

  

  </script>
  
</body>
</html>
