<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>

  <script>
    /*
    常量:也是一个容器，用于保存数据的。
        语法:const 常量名= 值;
        和变量的区别:常量里面保存的值是不允许改变的。注意:
        1.常量不允许重新赋值，可以理解为是只读的，如果多次赋值会出现错误
        2.声明的时候必须赋值(初始化)
    */
    //1、定义一个常量PI，值为3.14
    const PI = 3.14;
    //2、打印PI的值
    console.log(PI);
    //3、尝试重新赋值PI，会报错
    // PI = 3.1415926;

    console.log(PI);  
  </script>
  
</body>
</html>
