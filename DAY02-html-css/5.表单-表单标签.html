<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <!-- 
介绍：表单用<form>标签表示，内部包含<input>、<select>、<textarea>等表单项标签。
作用：收集用户信息，提交用户数据
form标签的常见属性：
  action: 指定表单提交的URL路径,将来填写后端程序的路径，表示数据提交到后端。
        效果：数据提交到哪，页面就会跳转到哪。
  method：指定提交方法，常见为GET或POST，不写默认值是GET方式，提交的数据格式：url?name=value&name=value&...
    GET方式：提交的数据在地址栏url路径后面。GET方式提交数据相对不安全。GET方式只能提交少量文本数据。
    POST方式：提交的数据在请求体(后面学)中，需要f12/fn+12查看。POST方式提交数据相对安全。POST方式可以提交大量任意数据。
-->
    <!-- method默认GET方式 -->
  <form action="1.tlias智能学习辅助系统.html" method="">
    <!-- 用户名输入框 /crrl+D: 复制并在下一行输入-->
    用户名：<input type="text" name="username" id=""><br>
    <!-- 密码输入框-->
    密码：<input type="password" name="password" id=""><br>
    <!-- 登录按钮-->
    <button>登录</button>
  </form>

</body>
</html>
