<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
    <!-- 登录按钮-->
     <!-- 
      input标签：定义不同类型的表单项
      type属性：定义input表单项的类型，常见属性值如下：
      text：普通文本输入框，输入的内容原模原样展示，默认值。
      password：密码框，输入的内容以点的形式呈现。
      radio：单选按钮，多选一。
      checkbox：复选框，可以多选。
      file：文件上传项，用来上传文件到服务器
      date/time/datetime-local：定义日期/时间/日期时间
      number：定义数字输入框
      email：定义邮件输入框
      hidden：隐藏域，用来提交不期望用户在页面看到的数据
      submit：提交按钮，点击之后提交表单数据
      reset：重置按钮，点击之后表单数据重置。
      button：普通按钮，点击之后没有任何反应，需要结合JavaScript才能做出点击效果。
-->
    <!-- method默认GET方式 -->
  <form action="1.tlias智能学习辅助系统.html" method="get">
    <!-- 用户名输入框 /crrl+D: 复制并在下一行输入-->
    用户名：<input type="text" name="username" id=""><br>
    <!-- 密码输入框-->
    密码：<input type="password" name="password" id=""><br>
    <!-- 性别单选按钮：name属性相同实现多选一 -->
    性别：
    <input type="radio" name="gender" >男
    <input type="radio" name="gender" >女
    <br>
    <!-- 爱好复选框：可以多选 -->
    爱好：
    <input type="checkbox" name="hobby" >足球
    <input type="checkbox" name="hobby" >篮球
    <input type="checkbox" name="hobby" >跑步
    <!-- 头像文件上传 -->
    头像：
    <input type="file" name="avatar" id="">
    <br>
    <!-- 生日日期选择 -->
    生日：
    <input type="date" name="birthday" id="">
    <br>
    <!-- 提交按钮：点击提交表单数据 -->
    <button type="submit">登录</button>
    <!-- 重置按钮：点击重置表单数据 -->
    <button type="reset">重置</button>
    <!-- 普通按钮：需结合JavaScript使用 -->
    <button type="button">普通按钮</button>
    <br>



  
      
     
  </form>

</body>
</html>
