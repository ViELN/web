<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    /* ----------------设置弹性布局，给父容器添加display:flex -----------------*/
    .container{
      width: 800px;
      height: 800px;
      background-color: pink;
      display: flex;
    }
    .item{
      /* 设置边框为1像素实线，颜色为红色 */
      border: 1px solid red;
      /* 设置宽度为200像素 */
      width: 200px;
      /* 设置高度为200像素 */
      height: 200px;
      /* 设置背景色为黄色 */
      background-color: yellow;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="item">1</div>
    <div class="item">2</div>
    <div class="item">3</div>
  </div>
</body>
</html>
