<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
<!-- 
name属性：
  1、所有表单项必须要有name属性，否则表单项中的数据无法提交，name属性值就是提交的数据的名字
  2、对于单选按钮和复选框而言，name属性值必须一样，视为一组，同组的单选按钮才有互斥效果。
value属性：
  1、对于普通表单项(输入框)而言，value属性表示输入框的默认值,可有可无。
  2、对于单选按钮和复选框而言，必须要有value属性，用于区分提交给服务器的数据，否则提交的都是on。
checked属性：用于设置单选按钮和复选框的默认选中(可有可无)。
placeholder属性：用于设置输入框中的提示信息，当输入框中有内容时提示信息会消失。
-->
    <!-- method默认GET方式 -->
  <form action="1.tlias智能学习辅助系统.html" method="">
    <!-- 用户名输入框 /crrl+D: 复制并在下一行输入-->
    用户名：<input type="text" name="username" id="" placeholder="请输入用户名"><br>
    <!-- 密码输入框-->
    密码：<input type="password" name="password" id="" placeholder="请输入密码"><br>
    <!-- 性别单选按钮：name属性相同实现多选一 -->
    <!-- 性别单选按钮：name属性相同实现多选一 -->
    性别：
    <input type="radio" name="gender" value="male" checked >男
    <input type="radio" name="gender" value="female" >女
    <br>
    <!-- 爱好复选框：可以多选 -->
    爱好：
    <input type="checkbox" name="hobby" value="soccer" checked >足球
    <input type="checkbox" name="hobby" value="basketball" >篮球
    <input type="checkbox" name="hobby" value="running" >跑步
    <br>
    <!-- 头像文件上传 -->
    头像：
    <input type="file" name="avatar" >
    <br>
    <!-- 生日日期选择 -->
    生日：
    <input type="date" name="birthday" >
    <br>
    <!-- 提交按钮：点击提交表单数据 -->
    <button type="submit">登录</button>
    <!-- 重置按钮：点击重置表单数据 -->
    <button type="reset">重置</button>
    <!-- 普通按钮：需结合JavaScript使用 -->
    <button type="button">普通按钮</button>
    <br>
