<!-- HTML5文档声明：告诉浏览器使用HTML5标准解析页面 -->
<!DOCTYPE html>
<!-- 根元素：lang属性指定语言为英语 -->
<html lang="en">
<!-- 头部区域：包含页面元信息和样式定义 -->
<head>
  <!-- 字符编码设置：UTF-8支持中文和特殊字符显示 -->
  <meta charset="UTF-8">
  <!-- 视口设置：适配移动端，宽度等于设备宽度，初始缩放比例为1 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- 页面标题：显示在浏览器标签页上 -->
  <title>Document</title>
  <!-- 内嵌样式表：定义页面样式 -->
  <style>
    /* 表格整体样式 */
    table {
      width: 80%;                /* 表格宽度占屏幕80% */
      margin: 0 auto;            /* 上下边距为0，左右边距自动分配，实现水平居中 */
      border-collapse: collapse; /* 合并相邻单元格的边框，使边框不重叠 */
    }

    /* 表格头部单元格和表格体单元格统一样式 */
    th, td {
      text-align: center;        /* 文字居中对齐 */
      padding: 8px;              /* 内边距8像素，增加单元格内空间 */
    }

    /* 表格头部样式 */
    th {
      background-color: #d3d3d3; /* 浅灰色背景，区分表头和表体 */
    }

    /* 头像图片样式 */
    .avatar {
      width: 50px;               /* 头像宽度50像素 */
      height: 50px;              /* 头像高度50像素 */
    }
  </style>
</head>
<!-- 主体区域：页面实际内容 -->
<body>
  <!-- 表格元素：border="1" 设置表格边框为1像素 -->
  <table border="1">
    <!-- 表格行：第一行为表头行 -->
    <tr>
      <th>姓名</th>        <!-- 表头单元格：姓名列 -->
      <th>性别</th>        <!-- 表头单元格：性别列 -->
      <th>头像</th>        <!-- 表头单元格：头像列 -->
      <th>岗位</th>        <!-- 表头单元格：岗位列 -->
      <th>入职时间</th>    <!-- 表头单元格：入职时间列 -->
      <th>离职时间</th>    <!-- 表头单元格：离职时间列 -->
    </tr>
    <!-- 表格行：第二行为第一条数据 -->
    <tr>
      <td>张三</td>                          <!-- 数据单元格：姓名 -->
      <td>男</td>                            <!-- 数据单元格：性别 -->
      <td><img src="./logout.png" alt="张三头像" class="avatar"></td>  <!-- 数据单元格：头像 -->
      <td>前端开发</td>                      <!-- 数据单元格：岗位 -->
      <td>2023-01-01</td>                   <!-- 数据单元格：入职时间 -->
      <td>2024-01-01</td>                   <!-- 数据单元格：离职时间 -->
    </tr>
    <!-- 表格行：第三行为第二条数据 -->
    <tr>
      <td>李四</td>                          <!-- 数据单元格：姓名 -->
      <td>女</td>                            <!-- 数据单元格：性别 -->
      <td><img src="./logout.png" alt="李四头像" class="avatar"></td>  <!-- 数据单元格：头像 -->
      <td>前端开发</td>                      <!-- 数据单元格：岗位 -->
      <td>2023-01-02</td>                   <!-- 数据单元格：入职时间 -->
      <td>2024-01-02</td>                   <!-- 数据单元格：离职时间 -->
    </tr>
    <!-- 表格行：第四行为第三条数据 -->
    <tr>
      <td>王五</td>                          <!-- 数据单元格：姓名 -->
      <td>男</td>                            <!-- 数据单元格：性别 -->
      <td><img src="./logout.png" alt="王五头像" class="avatar"></td>  <!-- 数据单元格：头像 -->
      <td>前端开发</td>                      <!-- 数据单元格：岗位 -->
      <td>2023-01-03</td>                   <!-- 数据单元格：入职时间 -->
      <td>2024-01-03</td>                   <!-- 数据单元格：离职时间 -->
    </tr>
  </table>
</body>
</html>
