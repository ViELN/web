<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    /* 将图片设置为块级元素，去除默认间隙 */
    img {
      display: block;
      /* 上下边距为0，左右自动居中 */
      margin: 0 auto;
      /* 图片宽度填满父容器 */
      width: 100%;
    }
  </style>
</head>
<body>
  <div>
    <img src="./images/综合案例一-产品卡片.png" alt="">
  </div>
  
</body>
</html>
