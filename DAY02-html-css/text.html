<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <div class="container">
    <div class="form-section">
      <form action="" method="post">
        <div class="form-name">
          <label for="name">姓名</label>
          <input type="text" id="name" placeholder="请输入姓名">
        </div><br>
        <div class="form-age">
          <label for="age">年龄</label>
          <input type="number" id="age" placeholder="请输入年龄">
        </div><br>
        <div class="form-gender">
          <label for="gender">性别</label>
          <input type="radio" id="gender" name="gender" value="male" checked>男
          <input type="radio" id="gender" name="gender" value="female">女
        </div><br>
        <div class="form-audience">
          <label for="audience">适用人群</label>
          <select id="audience">
            <option value="">请选择</option>
            <option value="beginner">小白学员</option>
            <option value="junior">初级程序员</option>
            <option value="intermediate">中级程序员</option>
          </select><br>
          <div class="form-description">
            <label for="description">课程介绍</label>
            <textarea id="description" placeholder="请输入课程介绍" rows="4" cols="30"></textarea>
          </div><br>
          <div class="form-submit">
            <button type="submit">提交</button>
            <button type="reset">重置</button>
          </div>
            
          



        
          

        </div> 
      </form> 

    </div>
  </div>
  
</body>
</html>
