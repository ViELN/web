<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS-事件-练习</title>
</head>

<body>

    <img id="light" src="./img/off.gif"> <br>

    <input type="button" value="点亮">
    <input type="button" value="熄灭">

    <br> <br>

    <input type="text" id="name" value="ITCAST">

    <br> <br>

    <input type="checkbox" name="hobby"> 电影
    <input type="checkbox" name="hobby"> 旅游
    <input type="checkbox" name="hobby"> 游戏

    <br> <br>

    <input type="button" value="全选">
    <input type="button" value="反选">

</body>

<script>
    //1. 点击 "点亮" 按钮, 点亮灯泡; 点击 "熄灭" 按钮, 熄灭灯泡; -- click
    let light = document.querySelector(`#light`)
    let onBtn = document.querySelector(`input[value='点亮']`)
    let offBtn = document.querySelector(`input[value='熄灭']`)
    onBtn.addEventListener(`click`,function(){
        light.src = `./img/on.gif`
    })
    offBtn.addEventListener(`click`,function(){
        light.src = `./img/off.gif`
    })
    
    //2. 输入框聚焦后, 展示小写; 输入框离焦后, 展示大写; -- focus , blur
    let name =document.querySelector(`#name`)
    name.addEventListener(`focus`,function(){
        name.value = name.value.toLowerCase()
    })
    name.addEventListener(`blur`,()=>{
        name.value = name.value.toUpperCase()
    })

    //3. 点击 "全选" 按钮使所有的复选框呈现选中状态 ; 点击 "反选" 按钮使所有的复选框呈现取消勾选的状态 ; -- onclick
    let checkAllBtn = document.querySelector(`input[value='全选']`)
    let reverseBtn = document.querySelector(`input[value='反选']`)
    let hobbies = document.querySelectorAll(`input[name='hobby']`)
    
    checkAllBtn.addEventListener(`click`, function(){
        for(let i = 0; i < hobbies.length; i++){
            hobbies[i].checked = true
        }
    })
    
    reverseBtn.addEventListener(`click`, function(){
        for(let i = 0; i < hobbies.length; i++){
            hobbies[i].checked = false
        }
    })

    
        
</script>

</html>
