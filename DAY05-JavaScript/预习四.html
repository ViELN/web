<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>
    // 方法
    // alert（警告信息’）：显示带有一段消息和一个确认按钮的警告框。
    // confirm（确认信息’）：显示带有一段消息以及确认按钮和取消按钮的对话框。
    // setTimeout（匿名函数，等待的毫秒）：在指定的毫秒数后调用函数或计算表达式（一次性定时器）。
    // setInterval（匿名函数，等待的毫秒）：按照指定的周期（以毫秒计）来调用函数或计算表达式（循环定时器）。


// alert（警告信息’）：显示带有一段消息和一个确认按钮的警告框。
    // window.alert("hello world");
    // alert("hello world");


    // confirm（确认信息’）：显示带有一段消息以及确认按钮和取消按钮的对话框。
    let isDelete= window.confirm("确认删除吗？");//返回值为true或false,用于确认对象选择确认还是取消
    console.log(isDelete);//true或false
    
  </script>
</body>
</html>
