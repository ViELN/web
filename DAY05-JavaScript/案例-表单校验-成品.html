<!DOCTYPE html>
<html>

<head>
    <title>表单</title>
    <style>
        label {
            display: inline-block;
            width: 80px;
            text-align: right;
            margin-right: 10px;
        }

        input {
            width: 250px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        .btn {
            width: 150px;
        }

        .tip {
            color: #ff0000;
            font-size: 12px;
        }
    </style>
</head>

<body>
    <div>
        <h1>用户注册</h1>
        <form>
            <label for="username">用户名：</label>
            <input type="text" id="username" name="username" placeholder="用户名不能为空且长度在4-16个字符">
            <span class="tip" id="name_msg"></span> <br>

            <label for="phone">手机号：</label>
            <input type="text" id="phone" name="phone" placeholder="手机号不能为空且长度为11位">
            <span class="tip" id="phone_msg"></span>
            <br>

            <input type="submit" value="提交" class="btn">
            <input type="reset" value="重置" class="btn">
        </form>
    </div>


    <script>
        //1. 校验用户名 - 失去焦点时校验 - blur
        let checkUsername = () => {
            //1 获取输入框内容
            let username = document.querySelector("#username").value;
            //2 校验输入框中的内容
            /*  if(username!=null && username.length >=4 && username.length<=16){
                 //4 如果满足要求，删除错误信息
                 document.querySelector("#name_msg").innerHTML="";
             }else{
                 //3 如果不满足要求，设置错误信息
                 document.querySelector("#name_msg").innerHTML="用户名不合法"
             } */
            let result = (username != null && username.length >= 4 && username.length <= 16);
            document.querySelector("#name_msg").innerHTML = result ? "" : "用户名不能为空且长度在4-16个字符";
            return result;
        }
        document.querySelector("#username").addEventListener("blur", checkUsername);

        //2. 校验手机号
        let checkPhone = () => {
            //1 获取输入框内容
            let phone = document.querySelector("#phone").value;
            //2 校验输入框中的内容
            /* if(phone!=null && phone.length >=4 && phone.length<=16){
                //4 如果满足要求，删除错误信息
                document.querySelector("#phone_msg").innerHTML=""
            }else{
                //3 如果不满足要求，设置错误信息
                document.querySelector("#phone_msg").innerHTML="手机号不合法"
            } */
            let result = (phone != null && phone.length >= 4 && phone.length <= 16);
            document.querySelector("#phone_msg").innerHTML = result ? "" : "手机号不能为空且长度为11位";
            return result;
        };
        document.querySelector("#phone").addEventListener("blur", checkPhone);

        //3. 表单提交的时候 - 校验整个表单 - submit
        document.querySelector("form").addEventListener("submit", () => {
            //用户名和手机号校验结果都为true才允许提交表单
            if(!checkUsername() | !checkPhone()){
                event.preventDefault();
            }
        })
    </script>
</body>

</html>
