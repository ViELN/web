<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./styles/index.css" />
  <title>Document</title>
</head>

<body>
  <div id="app" class="score-case">
    <div class="table">
      <table>
        <thead>
          <tr>
            <th>姓名</th>
            <th>科目</th>
            <th>成绩</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody>
          <!-- <tr>
            <td>1</td>
            <td>语文</td>
            <td class="red">46</td>
            <td><a href="#">删除</a></td>
          </tr>
          -->
        </tbody>

        <tfoot>
          <tr>
            <td colspan="5">
              <span class="total">总分：246</span>
              <span style="margin-left: 50px" class="average">平均分：79</span>
            </td>
          </tr>
        </tfoot>
      </table>
    </div>
    <div class="form">
      <div class="form-item">
        <div class="label">姓名：</div>
        <div class="input">
          <input type="text" placeholder="请输入姓名" class="username" />
        </div>
      </div>
      <div class="form-item">
        <div class="label">科目：</div>
        <div class="input">
          <input type="text" placeholder="请输入科目" class="subject" />
        </div>
      </div>
      <div class="form-item">
        <div class="label">分数：</div>
        <div class="input">
          <input type="text" placeholder="请输入分数" class="score" />
        </div>
      </div>
      <div class="form-item">
        <div class="label"></div>
        <div class="input">
          <button class="submit">添加</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 学生成绩数据数组
    const list = [
      { name: '古丽扎娜', subject: '语文', score: 20 },
      { name: '佟丽丫丫', subject: '数学', score: 99 },
      { name: '马尔扎哈', subject: '英语', score: 70 },
    ]

    // 获取DOM元素
    let userName = document.querySelector('.username')
    let subject = document.querySelector('.subject')
    let score = document.querySelector('.score')
    let submit = document.querySelector('.submit')
    let tbody = document.querySelector('tbody')
    let totalEl = document.querySelector('.total')
    let averageEl = document.querySelector('.average')

    // 1. 渲染表格函数：将学生数据展示到页面
    function renderTable() {
      // 清空tbody内容
      tbody.innerHTML = ''
      // 遍历list数组，生成表格行
      for (let i = 0; i < list.length; i++) {
        let item = list[i]
        // 创建表格行
        let tr = document.createElement('tr')
        // 设置行内容（成绩小于60显示红色）
        tr.innerHTML = `
          <td>${item.name}</td>
          <td>${item.subject}</td>
          <td ${item.score < 60 ? 'class="red"' : ''}>${item.score}</td>
          <td><a href="#" class="delete">删除</a></td>
        `
        // 将行添加到tbody
        tbody.appendChild(tr)
      }
    }

    // 2. 计算总分和平均分函数
    function calculateStats() {
      let total = 0
      for (let i = 0; i < list.length; i++) {
        total += parseInt(list[i].score)
      }
      let average = list.length > 0 ? Math.round(total / list.length) : 0
      // 更新页面显示
      totalEl.textContent = '总分：' + total
      averageEl.textContent = '平均分：' + average
    }

    // 3. 初始化渲染
    renderTable()
    calculateStats()

    // 4. 绑定提交按钮点击事件
    submit.addEventListener('click', function() {
      // 获取输入框中的值
      let name = userName.value.trim()
      let sub = subject.value.trim()
      let sc = score.value.trim()

      // 简单验证
      if (!name || !sub || !sc) {
        alert('请填写完整信息')
        return
      }

      // 将获取到的值添加到list数组中（字段名要与原数组一致）
      list.push({ name: name, subject: sub, score: parseInt(sc) })

      // 清空输入框
      userName.value = ''
      subject.value = ''
      score.value = ''

      // 刷新表格
      renderTable()

      // 刷新总分和平均分
      calculateStats()
    })
  </script>
</body>

</html>
