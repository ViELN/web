<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>
  let phone={
      brand:"小米(MI)",
      name:"小米10 青春版",
      num:100012816024,
      weight:"0.55kg",
      address:"中国大陆",
  }
  //调用对象的属性
  console.log(phone.brand,phone.name,phone.num,phone.weight,phone.address);
  //修改对象的属性
  phone.name="小米15 ultra";
  console.log(`修改后：`+phone.name);
  console.log(phone.brand,phone.name,phone.num,phone.weight,phone.address);
//添加一个属性，属性名叫color，属性值为"白色"
  phone.color="白色";
  console.log(`添加后：`+phone.color);
//删除"商品毛重"属性
  delete phone.weight;
//打印商品信息
  console.log(phone);

  </script>
  
</body>
</html>
