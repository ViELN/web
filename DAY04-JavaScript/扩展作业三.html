// 需求： 定义一个函数，接收一个字符串，统计字符串中英文字母的个数并返回（例如输入"HelloWorld"，返回10）。
//方法二：使用for循环遍历字符串中的每个字符，判断是否是英文字母、数字、空格、其它字符，如果是，统计英文字母、数字、空格、其它字符的个数
    let str=prompt("请输入一个字符串");//获取用户输入的字符串
    function strCount(str){
      let count=0;//定义一个变量，用于统计英文字母的个数
      let num=0;//定义一个变量，用于统计数字的个数
      let space=0;//定义一个变量，用于统计空格的个数
      let other=0;//定义一个变量，用于统计其它字符的个数
      for(let i=0;i<str.length;i++){
        let ch=str[i];//获取当前字符
        if(ch>`a`&&ch<`z`||ch>`A`&&ch<`Z`){//如果当前字符是英文字母
          count++;//统计英文字母的个数
        }else if(ch>`0`&&ch<`9`){//如果当前字符是数字
          num++;//统计数字的个数
        }else if(ch===` `){
          space++;//统计空格的个数
        }else{
          other++;//统计其它字符的个数  
        }
        
      }
      return {count,num,space,other};//返回英文字母、数字、空格、其它字符的个数
    }
    let res=strCount(str);//调用函数，统计字符串中英文字母、数字、空格、其它字符的个数
    console.log(`${str}中英文字母的个数为${res.count}，数字的个数为${res.num}，空格的个数为${res.space}，其它字符的个数为${res.other}`);//输出结果






  </script>
