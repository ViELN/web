<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>
    /* 
      需求1：页面输出1~100的偶数
      需求2：求1-100之间的数字之和（1+2+3...+100的和）
      需求3：求1-100之间所有的偶数和
    */
// 需求1：页面输出1~100的偶数
for (let i=1;i<=100;i++){
  if(i%2==0){
    document.write(i);//写法一
  }
}document.write('<br>');
for (let i=2;i<=100;i+=2){
  if(i%2==0){
    document.write(i);//写法二
  }
}document.write('<br>');
//需求2：求1-100之间的数字之和（1+2+3...+100的和）
let sum = 0;
for (let i=1;i<=100;i++){
  sum += i;
}
document.write(sum);
document.write('<br>');
//需求3：求1-100之间所有的偶数和
let sum2 = 0;
for (let i=2;i<=100;i+=2){
  sum2 += i;
}
document.write(sum2);

  
  </script>
</body>
</html>
