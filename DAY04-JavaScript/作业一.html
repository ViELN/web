<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>
    let x=prompt("请输入第一个数字");
    let y=prompt("请输入第二个数字");
    let bigger;//声明变量
    if(x>y){
      bigger=x;
    }else{
      bigger=y;
    }
    console.log(`较大值为${bigger}`);//输出较大值

  </script>
  
</body>
