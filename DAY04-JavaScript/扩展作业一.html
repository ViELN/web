  <script>
    // 声明一个空数组用于存储随机数
    let arr=[];
    // 循环20次，生成20个随机数
    for(let i=0;i<20;i++){
      // 生成[100, 1000)范围内的随机三位整数并添加到数组
      arr.push(Math.floor(Math.random() * 900) + 100);
    }console.log(`原始数组${arr}`);
//方法一：使用数字操作符判断是否为回文数
    for(i=0;i<arr.length;i++){
      let gw=parseInt(arr[i]%10);
      let sw=parseInt(arr[i]/10)%10;
      let bw=parseInt(arr[i]/100);
      let gwswbw=Number(gw*100+sw*10+bw);
      let bwswgw=Number(bw*100+sw*10+gw);
      if(gwswbw==bwswgw){
        console.log(`${arr[i]} 是回文数`);
      }
      }
