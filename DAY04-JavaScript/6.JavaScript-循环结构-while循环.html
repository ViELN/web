<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>
    /* 
      while循环：控制一段代码重复执行多次。
      语法：
        初始化语句1
        while(循环条件2){
          循环体语句(要重复执行的代码)3
          迭代语句4
        }
        初始化语句:定义循环变量，表示循环的次数。例如：let i=0;
        循环条件:通过判断循环变量的值来控制循环是否执行，条件为true就继续循环，否则结束循环。
        循环体语句:要重复执行的代码。
        迭代语句:每次循环结束后，修改循环变量的值，例如：i++;
      执行流程：1234--》234--》234--》234--》...--》234--》2的结果为false循环结束
    */
    let i=0;
    while(i<4){
     document.write(`卢本伟牛逼<br>`);
      i++;
    }
   
  </script>

  
</body>
</html>
