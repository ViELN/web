<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>
   /*
      函数：也叫方法，是可以被重复使用的代码块,一个方法完成一个功能。
      函数的使用步骤：
        第一步：定义函数
          function 函数名(变量1,变量2,...){   //(变量1,变量2,...) 也叫参数列表
            函数体语句(要重复执行的代码)
            return 结果;  //有结果就使用return关键字返回，没有就不写
          }
        第二步：调用函数：函数定义好了不会自动执行，需要调用才执行。
          let 结果变量 = 函数名(参数值1,参数值2,...);
    */
   //第一步：定义函数
    function sum(a,b){
      document.write(`程序执行了<br>`);
      return a+b; 
    }
    //第二步：调用函数
    let result = sum(10,20);
    document.write(result);
  </script>

  
</body>
</html>
