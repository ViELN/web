    // 需求三：定义函数，获取数组中去除最大值和最小值之后的平均值
    function print3(){
      let arr=[1,2,3,4,7,9,14,20,30,40];
      let max=arr[0];
      for(let i=0;i<arr.length;i++){
        if(arr[i]>max){
          max=arr[i];
        }
      }
      let min = arr[0];
      for(let i=0;i<arr.length;i++){
        if(arr[i]<min){
          min=arr[i];
        }
      }
      let sum=0;
      for(let i=0;i<arr.length;i++){
        if(arr[i]!=max&&arr[i]!=min){
          sum+=arr[i];
        }
      }
      let ave=sum/(arr.length-2); 
      return ave;

    }
    console.log(`数组中去除最大值和最小值之后的平均值为${print3()}`);
