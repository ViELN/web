  <script>
    /*
  需求：求数组[2,6，-1，25,7］中的最大值。
  分析：
    1、定义变量max保存最大值，初始值为数组0索引处的值
    2、循环遍历数组，将每个元素值与max比较。
    3、如果比max大，则将当前元素值赋值给max。
    4、循环结束后，max中保存的就是数组中的最大值。
*/
let arr=[2,6,-1,25,7];
// 1、定义变量max保存最大值，初始值为数组0索引处的值
let max=arr[0];
// 2、循环遍历数组，将每个元素值与max比较。
for(let i=1;i<arr.length;i++){
  // 3、如果比max大，则将当前元素值赋值给max。
  if(arr[i]>max){
    max=arr[i];
  }
}
// 4、循环结束后，max中保存的就是数组中的最大值。
console.log(`数组[${arr}]中的最大值是：${max}`);

  </script>
