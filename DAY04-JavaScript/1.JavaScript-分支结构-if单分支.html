<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>
    /* 
      if分支语句：
        作用：根据条件判断是否执行某段代码。
        分类：
          单分支：if(条件){
            代码块;
          }
          执行流程：先判断条件的结果，如果是true就执行{}中的代码，否则不执行。
      需求：用户输入高考成绩，如果分数大于等于700分，则提示‘恭喜考入黑马程序员'。
    */
    let score = prompt('请输入高考成绩');
    if (score >= 700) {
      alert('恭喜考入黑马程序员');
    }
    alert('程序结束');
    
  </script>

  
</body>
</html>
