<style>
  /*  1、span标签：是一个在开发网页时大量会用到的没有语义的布局标签
        特点：一行可以显示多个span标签，span标签的宽度和高度默认由内容撑开
    2、css选择器：
        元素选择器：元素名称 {...}，例如: h1{...}，选择页面上所有的<h1>标签
        类选择器：.class属性值 {...}，例如: .cls{...}，选择页面上所有class="cls"的标签
          第一步：给标签添加class="xxx"属性值   class="cls"
          第二步：将.class属性值作为选择器的名称  例如：.cls{}
        id选择器：#id属性值 {...}，例如: #time{...}，选择页面上id="time"的标签
          第一步：给标签添加id="xxx"属性值  例如：id="time"
          第二步：将#id属性值作为选择器的名称  例如：#time{}
        ...
        选择器优先级：优先级：id选择器 > 类选择器 > 元素选择器a */
  span{
    color: #b2b2b2;
  }
  .cls{
    color: #ff0000;
  }
  #sz{
    color: #0000ff;
  }
 
 
</style>
