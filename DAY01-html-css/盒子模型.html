<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
<style>
  /* 设置div元素的样式 */
  div {
    width: 200px;        /* 设置宽度为200像素 */
    height: 200px;       /* 设置高度为200像素 */
    background-color: gray;  /* 设置背景颜色为灰色 */
    border: 2px dashed blue; /* 设置边框为2像素蓝色虚线 */
    padding: 20px;       /* 设置内边距为20像素 */
    margin: 50px;        /* 设置外边距为50像素 */
  }
</style>
</head>
<body>
  <div>
    我是一个div
  </div>
  <div>
    我是第二个div标签
  </div>
</body>
</html>
