<!DOCTYPE html>
<!-- HTML文档声明，表示这是一个HTML5文档 -->
<html lang="en">
<!-- head标签：包含文档的元数据，不会直接显示在页面内容中 -->
<head>
  <!-- meta标签：设置字符编码为UTF-8，支持中文显示 -->
  <meta charset="UTF-8">
  <!-- meta标签：视口设置，使页面在移动设备上正确缩放 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- title标签：定义浏览器标签页显示的标题 -->
  <title>HTML快速入门</title>
</head>
<!-- body标签：包含页面的所有可见内容 -->
<body>
  <!-- h1标签：一级标题 -->
  <h1>入门程序</h1>
  <!-- img标签：插入图片，src指定图片路径，alt指定图片无法显示时的替代文本 -->
  <img src="1.png" alt="入门程序">
</body>
</html>
